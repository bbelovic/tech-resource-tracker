version: '3.9'
services:
  e2e-tests:
    build: frontend/src/main/frontend
    environment:
      - CYPRESS_AUTH0_DOMAIN=https://dev-uoxwgcszzu82p8ot.us.auth0.com
      - CYPRESS_AUTH0_USERNAME_FILE=/run/secrets/auth0_username
      - CYPRESS_AUTH0_PASSWORD_FILE=/run/secrets/auth0_password
      - URL_TO_WAIT=http://tech-resource-tracker-be:8080
      - CYPRESS_APP_HOST=http://tech-resource-tracker-be:8080
    volumes:
      - ./frontend/src/main/frontend:/e2e
    entrypoint: ["./entrypoint.sh"]
    secrets:
      - auth0_username
      - auth0_password
  db:
    image: 'postgres:13'
    environment:
      - POSTGRES_USER=db_user
      - POSTGRES_PASSWORD=db_pass
    volumes:
      - ./misc/tracker-dump.sql:/docker-entrypoint-initdb.d/tracker-dump.sql
  tech-resource-tracker-be:
    image: 'bbelovic/tech-resource-tracker-composed'
    environment:
      - SPRING_PROFILES_ACTIVE=e2e
      - AUTH0_DOMAIN=https://dev-uoxwgcszzu82p8ot.us.auth0.com
      - SPRING_DATASOURCE_USERNAME=db_user
      - SPRING_DATASOURCE_PASSWORD=db_pass
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/tech_resource_tracker_db
      - URL_TO_WAIT=jdbc:postgresql://db:5432/tech_resource_tracker_db
      - logging.level.org.bbelovic.techresourcetracker.DefaultTechResourceService=TRACE
    depends_on:
      - db
    entrypoint: ["./entrypoint.sh"]
    secrets:
      - auth0_client_id
      - auth0_client_secret
    ports:
      - "8080:8080"

secrets:
  auth0_username:
    file: ./auth0_username.txt
  auth0_password:
    file: ./auth0_password.txt
  auth0_client_id:
    file: ./auth0_client_id.txt
  auth0_client_secret:
    file: ./auth0_client_secret.txt
